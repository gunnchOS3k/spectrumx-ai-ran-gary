  status: integration_ready_placeholder

materials:
  city_materials_usd: data/aerial_omniverse/materials/city_materials.usd
  status: integration_ready_placeholder

mobility_traces:
  pedestrian_geojson: data/mobility_traces/pedestrian_flows.geojson
  vehicle_geojson: data/mobility_traces/vehicle_flows.geojson
  status: integration_ready_placeholder

dynamic_scatterers:
  summary_json: data/aerial_omniverse/scatterers/dynamic_summary.json
  status: integration_ready_placeholder

scene_import:
  usd_root: data/aerial_omniverse/scene_export.usd
  status: integration_ready_placeholder
