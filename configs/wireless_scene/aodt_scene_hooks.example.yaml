# Status: next scaling path — requires NVIDIA Omniverse / Aerial tooling outside this repo.

version: 1
notes:
  - "AODT positions physically accurate RF twins: terrain, vegetation, materials, mobility, scatterers."

terrain:
  dem_path: data/aerial_omniverse/terrain/gary_dem.tif
  status: integration_ready_placeholder

vegetation:
